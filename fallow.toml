# Cosmonauts publishes TypeScript source and allows consumers/tests to deep-import
# these stable module entry points. Treat their exports as public API.
entry = [
  "lib/agents/index.ts",
  "lib/artifact-viewer/index.ts",
  "lib/architecture-map/index.ts",
  "lib/config/index.ts",
  "lib/domains/index.ts",
  "lib/durable-runtime/index.ts",
  "lib/packages/index.ts",
  "lib/plans/index.ts",
  "lib/prompts/index.ts",
  "lib/sessions/index.ts",
  "lib/skills/index.ts",
  "lib/runtime.ts",
  "lib/orchestration/agent-spawner.ts",
  "lib/orchestration/chain-profiler.ts",
  "lib/orchestration/definition-resolution.ts",
  "lib/orchestration/message-bus.ts",
  "lib/orchestration/session-factory.ts",
  "lib/orchestration/spawn-tracker.ts",
  "lib/orchestration/types.ts",
  "lib/packages/scanner.ts",
]

# Fallow duplication gates production code; test fixtures intentionally repeat setup
# to keep behavior cases local and readable.
production = { dupes = true }

# Framework convention: domain packages and extension entry points are loaded by
# Cosmonauts/Pi through runtime discovery and dynamic import, not static imports.
dynamicallyLoaded = [
  "bundled/*/agents/*.ts",
  "bundled/*/chains.ts",
  "bundled/*/domain.ts",
  "bundled/*/workflows.ts",
  "domains/*/agents/*.ts",
  "domains/*/chains.ts",
  "domains/*/domain.ts",
  "domains/*/extensions/*/index.ts",
  "domains/*/workflows.ts",
]
